language: "en-US"
tone_instructions: "Be concise and direct. Flag security issues like exposed API keys, missing .gitignore entries, and hardcoded credentials. Flag data loss risks. Skip style nitpicks. If you see work that could be lost because it hasn't been pushed or is only local, call it out explicitly."
reviews:
  profile: "assertive"
  auto_review:
    enabled: true
    drafts: true
    base_branches: ["main", "master"]
  path_filters:
    - "!**/*.lock"
    - "!**/venv/**"
    - "!**/node_modules/**"
    - "!**/frameworks/**"
    - "!**/dist/**"
    - "!**/build/**"
  finishing_touches:
    docstrings:
      enabled: false
  review_status: true
  poem: false
  collapse_walkthrough: false
  sequence_diagrams: false
chat:
  auto_reply: true
knowledge_base:
  opt_out: false
