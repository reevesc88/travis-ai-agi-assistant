# Travis Ai Agi Assistant Workflow Agent Skill Addition Or Update

## Action

Follow the agent-skill-addition-or-update workflow:
1. Create or update SKILL.md and related documentation files in .agents/skills/<skill-name>/
2. Add or update scripts (e.g., Python, JS) in .agents/skills/<skill-name>/scripts/
3. Add or update references and supporting assets (images, data, schemas) in .agents/skills/<skill-name>/references/ or assets/
4. Update LICENSE.txt and metadata files as needed

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: .agents/skills/*/SKILL.md, .agents/skills/*/README.md, .agents/skills/*/scripts/*

