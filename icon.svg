<svg viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
  <rect width="180" height="180" rx="20%" fill="#16a34a"/>
  <!-- Calendar outline -->
  <rect x="40" y="50" width="100" height="90" rx="10" fill="none" stroke="#fff" stroke-width="7"/>
  <!-- Calendar top hooks -->
  <line x1="68" y1="38" x2="68" y2="58" stroke="#fff" stroke-width="7" stroke-linecap="round"/>
  <line x1="112" y1="38" x2="112" y2="58" stroke="#fff" stroke-width="7" stroke-linecap="round"/>
  <!-- Calendar header line -->
  <line x1="40" y1="74" x2="140" y2="74" stroke="#fff" stroke-width="7"/>
  <!-- Clock circle inside calendar -->
  <circle cx="90" cy="108" r="22" fill="none" stroke="#fff" stroke-width="5"/>
  <!-- Clock hands -->
  <line x1="90" y1="108" x2="90" y2="94" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
  <line x1="90" y1="108" x2="102" y2="108" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
</svg>
